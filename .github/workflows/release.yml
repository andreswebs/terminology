---
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  # gh release create publishes the release and uploads assets.
  contents: write
  # cosign keyless signing exchanges this OIDC token with Sigstore's Fulcio for a
  # short-lived signing certificate; the same token backs attest-build-provenance.
  id-token: write
  # attest-build-provenance persists SLSA build provenance to the GitHub
  # attestations API for each released archive.
  attestations: write

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history and tags so `git describe` in the Makefile resolves
          # correctly, matching the VERSION we pass in below.
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          install-only: true

      # dist -> build-all -> validate runs the full quality gate before
      # cross-compiling and packaging every platform. VERSION is pinned to the
      # pushed tag so binaries report it via internal/version.Override.
      - name: Build distribution archives
        run: make dist VERSION="${GITHUB_REF_NAME}"

      # cosign-installer v4 installs cosign v3.x, which writes the standardized
      # Sigstore bundle format (.sigstore.json). Consumers need cosign v3+ to
      # verify.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # SYFT_SOURCE_* names the SBOM's root package explicitly; without them Syft
      # derives it from the scanned directory path instead of the released
      # software's identity.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        env:
          SYFT_SOURCE_NAME: terminology
          SYFT_SOURCE_VERSION: ${{ github.ref_name }}
        with:
          path: src
          format: spdx-json
          output-file: dist/terminology-${{ github.ref_name }}.spdx.json
          upload-artifact: false

      # Keyless-sign the checksums file, which transitively covers every archive.
      - name: Sign checksums
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.txt.sigstore.json dist/SHA256SUMS.txt

      # Keyless-sign the SBOM, mirroring the checksums signature.
      - name: Sign SBOM
        run: |
          cosign sign-blob --yes \
            --bundle "dist/terminology-${GITHUB_REF_NAME}.spdx.json.sigstore.json" \
            "dist/terminology-${GITHUB_REF_NAME}.spdx.json"

      # subject-checksums attests every archive in the file as its own subject,
      # so `gh attestation verify <archive>` works on any single download.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS.txt

      - name: Create GitHub release
        uses: ./.github/actions/gh-release
        with:
          tag: ${{ github.ref_name }}
          repo: ${{ github.repository }}
          github-token: ${{ github.token }}
