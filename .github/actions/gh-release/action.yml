---
name: Publish signed release
description: Create a GitHub release with artifact-verification instructions in the notes.

inputs:
  tag:
    description: Release tag to publish (e.g. v1.2.0).
    required: true
  repo:
    description: owner/name used in the verification instructions.
    required: true
  github-token:
    description: Token used by the gh CLI to create the release.
    required: true
  dist-dir:
    description: Directory containing the release artifacts.
    required: false
    default: dist

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TAG: ${{ inputs.tag }}
        REPO: ${{ inputs.repo }}
        DIST_DIR: ${{ inputs.dist-dir }}
      run: bash "${GITHUB_ACTION_PATH}/create-release.bash"
